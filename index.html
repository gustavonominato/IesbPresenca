<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Processador de Presenças</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="mb-2">Processador de Presenças</h2>

            <p class="text-muted">
                Selecione a pasta raiz contendo as subpastas com os arquivos Excel.
            </p>

            <div class="mb-3">
                <label for="folderInput" class="form-label">Pasta com os arquivos</label>
                <input
                        type="file"
                        id="folderInput"
                        class="form-control"
                        webkitdirectory
                        directory
                        multiple
                />
            </div>

            <button id="btnProcessar" class="btn btn-primary">
                Processar
            </button>

            <button id="btnExportar" class="btn btn-success d-none ms-2">
                Exportar Excel Consolidado
            </button>

            <div id="alerta" class="alert d-none mt-4" role="alert"></div>

            <hr />

            <h4>Resumo dos arquivos</h4>
            <div id="resumoArquivos" class="mb-4"></div>

            <h4>Relatório consolidado</h4>
            <div id="relatorioFinal" class="table-responsive"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
