<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Processador de Presenças</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />
    <style>
        .table {
            border-color: black !important;
        }
        .table thead.table-dark {
            --bs-table-bg: #0d6efd;
            --bs-table-color: #fff;
        }

        .table thead.table-dark th {
            border-color: black !important;
        }

        .coluna-data-vertical {
            width: 42px;
            min-width: 42px;
            max-width: 42px;
            padding: 8px 0 !important;
            vertical-align: top !important;
            white-space: nowrap;
        }

        .coluna-data-vertical span {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            display: inline-block;
        }
    </style>
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="mb-2">Processador de Presenças</h2>

            <p class="text-muted">
                Selecione a pasta raiz contendo as subpastas com os arquivos Excel.
            </p>

            <div class="mb-3">
                <label for="folderInput" class="form-label">Pasta com os arquivos</label>
                <input
                        type="file"
                        id="folderInput"
                        class="form-control"
                        webkitdirectory
                        directory
                        multiple
                />
            </div>

            <button id="btnProcessar" class="btn btn-primary">
                Processar
            </button>

            <button id="btnExportar" class="btn btn-success d-none ms-2">
                Exportar Excel Consolidado
            </button>

            <div id="alerta" class="alert d-none mt-4" role="alert"></div>

            <hr />

            <div id="blocoResumoArquivos" class="d-none">
                <button
                        id="btnCollapseResumoArquivos"
                        class="btn btn-link text-decoration-none p-0 mb-3"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseResumoArquivos"
                        aria-expanded="false"
                        aria-controls="collapseResumoArquivos"
                >
                    <span id="iconeCollapseResumoArquivos" class="me-1">▶</span>
                    <strong>Resumo dos arquivos</strong>
                </button>

                <div class="collapse" id="collapseResumoArquivos">
                    <div id="resumoArquivos" class="mb-4"></div>
                </div>
            </div>

            <div id="relatorioFinal" class="table-responsive"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./app.js"></script>
</body>
</html>
